name: linux-builds

on:
  push:
    branches:
      - main

  pull_request:
  merge_group:

env:
  OWNER: ${{ github.repository_owner }}
  BUILDKIT_PROGRESS: plain

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true


permissions: {}

jobs:

  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write

    strategy:
      matrix:
        file:
          - docker-dind
          - forgejo
          - forgejo-runner
          - garage
          - github-runner
          - nextcloud
          - roundcube
          - traefik
          - uptime-kuma
          - verdaccio

    env:
      FILE: ${{ matrix.file }}
      IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.file }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: imjasonh/setup-crane@6da1ae018866400525525ce74ff892880c099987 # v0.5
        with:
          version: v0.21.7 # renovate: datasource=github-releases depName=crane packageName=google/go-containerregistry

      - name: docker-config
        uses: containerbase/internal-tools@996b3b768d49c2ea862ef91b72b61174ff9fb1ea # v4.6.61
        with:
          command: docker-config

      - name: Build the Docker image
        run: |
          docker buildx bake --metadata-file /tmp/meta.json test
          jq . /tmp/meta.json

      - name: Test run
        run: docker compose --file docker-compose.test.yml run sut
        working-directory: ./linux/${{ env.FILE }}

      - name: Log into registry
        if: github.ref_name == 'main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Publish the Docker image
        if: github.ref_name == 'main'
        run: |
          docker buildx bake --metadata-file /tmp/meta.json build
          jq . /tmp/meta.json
          digest=$(jq -r '.push_ghcr.["containerimage.digest"]' /tmp/meta.json)
          echo "digest=$digest" >> "$GITHUB_ENV"

      - name: Attest the Docker image
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        if: github.ref_name == 'main'
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ env.digest }}
          push-to-registry: true

      - name: Publish the Docker image tags
        if: github.ref_name == 'main'
        run: |
          if [ -f push.sh ]; then
            ./push.sh
          fi
        working-directory: ./linux/${{ env.FILE }}

  success-linux:
    needs:
      - linux
    runs-on: ubuntu-latest
    timeout-minutes: 1
    if: always()
    steps:
      - name: Fail for failed or cancelled linux
        if: |
          needs.linux.result == 'failure' ||
          needs.linux.result == 'cancelled'
        run: exit 1
